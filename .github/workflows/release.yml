name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*' # Triggers when pushing tags like v1.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          ./mvnw -B -ntp install \
            --file pom.xml \
            -Dintegration.tests.skip=true \
            -Ddocker.skip.tests=true \
            -Dopenapi.skip=false \
            -Dasciidoc.process.skip=true

      - name: Find JAR files
        id: find_jars
        run: |
          OPENAPITOOLS=$(find bm-traccar/traccar-openapitools-client/target -name 'traccar-openapitools-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)
          API_CLIENT=$(find bm-traccar/traccar-api-client/target -name 'traccar-api-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)
          REALTIME=$(find bm-traccar/traccar-realtime-client/target -name 'traccar-realtime-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*.jar.original' | head -n 1)
          REALTIME_ORIG=$(find bm-traccar/traccar-realtime-client/target -name 'traccar-realtime-client-*.jar.original' | head -n 1)

          test -n "$OPENAPITOOLS"
          test -n "$API_CLIENT"
          test -n "$REALTIME"
          test -n "$REALTIME_ORIG"

          echo "openapitools_client=$OPENAPITOOLS" >> "$GITHUB_OUTPUT"
          echo "api_client=$API_CLIENT" >> "$GITHUB_OUTPUT"
          echo "realtime_client=$REALTIME" >> "$GITHUB_OUTPUT"
          echo "realtime_client_original=$REALTIME_ORIG" >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.find_jars.outputs.openapitools_client }}
            ${{ steps.find_jars.outputs.api_client }}
            ${{ steps.find_jars.outputs.realtime_client }}
            ${{ steps.find_jars.outputs.realtime_client_original }}