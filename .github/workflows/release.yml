name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*' # Triggers when pushing tags like v1.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          ./mvnw install \
            --file pom.xml \
            -Dintegration.tests.skip=true \
            -Ddocker.skip.tests=true \
            -Dopenapi.skip=false \
            -Dasciidoc.process.skip=true

      - name: Find JAR files
        id: find_jars
        run: |
          OPENAPITOOLS=$(find bm-traccar/traccar-openapitools-client/target -name 'traccar-openapitools-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar')
          API_CLIENT=$(find bm-traccar/traccar-api-client/target -name 'traccar-api-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar')
          REALTIME=$(find bm-traccar/traccar-realtime-client/target -name 'traccar-realtime-client-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*.jar.original')
          REALTIME_ORIG=$(find bm-traccar/traccar-realtime-client/target -name 'traccar-realtime-client-*.jar.original')

          echo "openapitools_client=$OPENAPITOOLS" >> $GITHUB_OUTPUT
          echo "api_client=$API_CLIENT" >> $GITHUB_OUTPUT
          echo "realtime_client=$REALTIME" >> $GITHUB_OUTPUT
          echo "realtime_client_original=$REALTIME_ORIG" >> $GITHUB_OUTPUT

          # Extract versioned filenames directly from the found paths
          echo "openapitools_client_name=$(basename $OPENAPITOOLS)" >> $GITHUB_OUTPUT
          echo "api_client_name=$(basename $API_CLIENT)" >> $GITHUB_OUTPUT
          echo "realtime_client_name=$(basename $REALTIME)" >> $GITHUB_OUTPUT
          echo "realtime_client_original_name=$(basename $REALTIME_ORIG)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload traccar-openapitools-client.jar
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_jars.outputs.openapitools_client }}
          asset_name: ${{ steps.find_jars.outputs.openapitools_client_name }}
          asset_content_type: application/java-archive

      - name: Upload traccar-api-client.jar
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_jars.outputs.api_client }}
          asset_name: ${{ steps.find_jars.outputs.api_client_name }}
          asset_content_type: application/java-archive

      - name: Upload traccar-realtime-client.jar
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_jars.outputs.realtime_client }}
          asset_name: ${{ steps.find_jars.outputs.realtime_client_name }}
          asset_content_type: application/java-archive

      - name: Upload traccar-realtime-client.jar.original
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_jars.outputs.realtime_client_original }}
          asset_name: ${{ steps.find_jars.outputs.realtime_client_original_name }}
          asset_content_type: application/java-archive