name: Deploy Documentation to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start Kroki
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f kroki >/dev/null 2>&1 || true
          docker run -d --name kroki \
            -p 8002:8000 \
            --memory=2g \
            --cpus=2 \
            -e KROKI_MAX_URI_LENGTH=25000 \
            -e KROKI_TIMEOUT=60000 \
            yuzutech/kroki:0.27.0
          # Note: KROKI_TIMEOUT is in milliseconds (60000ms = 60s)

      - name: Wait for Kroki health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..90}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8002/health || true)"
            if [ "$code" = "200" ]; then
              echo "Kroki is healthy."
              # Give Kroki extra time to fully stabilize before processing diagrams
              echo "Waiting 5 seconds for Kroki to fully stabilize..."
              sleep 5
              exit 0
            fi
            echo "[$i/90] waiting for Kroki health endpoint (got: ${code:-none})..."
            sleep 2
          done

          echo "::error::Kroki did not become healthy in time"
          echo "==== docker ps ===="
          docker ps -a || true
          echo "==== kroki logs ===="
          docker logs kroki || true
          exit 1

      - name: Build project and generate documentation
        run: |
          ./mvnw -B -ntp install \
            --file pom.xml \
            -Dintegration.tests.skip=true \
            -Ddocker.skip.tests=true \
            -Dopenapi.skip=false \
            -Dasciidoc.process.skip=false \
            -Dasciidoctor.attributes="kroki-server-url=http://127.0.0.1:8002"

      - name: Prepare documentation for upload
        run: |
          mkdir -p _site
          cp -r bm-docs/target/generated-docs/* _site/
          
          # Prevent Jekyll processing
          touch _site/.nojekyll
          
          # Create a simple index.html that redirects to bm.html
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Blue Marble Documentation</title>
            <meta http-equiv="refresh" content="0; url=bm.html">
            <link rel="canonical" href="bm.html">
            <style>
              body {
                font-family: "Open Sans", "DejaVu Sans", sans-serif;
                max-width: 800px;
                margin: 100px auto;
                text-align: center;
              }
              h1 { color: #ba3925; }
              a { color: #2156a5; }
            </style>
          </head>
          <body>
            <h1>Blue Marble Documentation</h1>
            <p>Redirecting to <a href="bm.html">main documentation</a>...</p>
            <hr>
            <h2>Direct Links</h2>
            <ul style="list-style: none; padding: 0;">
              <li><a href="bm.html">Main Documentation</a></li>
              <li><a href="bm-parent/bm-parent.html">BM Parent</a></li>
              <li><a href="bm-tracker/gps-osmand-tracker/gps-osmand-tracker.html">GPS OsmAnd Tracker</a></li>
              <li><a href="bm-tracker/gps-osmand-player/gps-osmand-player.html">GPS OsmAnd Player</a></li>
              <li><a href="bm-traccar/traccar-api-client/traccar-api-client.html">Traccar API Client</a></li>
              <li><a href="bm-traccar/traccar-realtime-client/traccar-realtime-client.html">Traccar Realtime Client</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Delete old artifacts (if any)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'github-pages') {
                console.log(`Deleting old artifact ${artifact.id}`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Stop Kroki
        if: always()
        run: docker rm -f kroki || true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
