spring.application.name=rt-client

### traccar server configuration
# TODO: parse servers provided in yaml -> check generated ApiClient content, i.e. debug ..
# or get infos from generated ApiClient class, avoid yaml in this project
# traccar.openapi=openapi-traccar-6.6.yaml
# traccar.openapi=https://petstore3.swagger.io/api/v3/openapi.json

# port can be empty, defaults to port ':80'. 
# MUST provide a colon! i.e. :8080
traccar.port=
# http:// or secure https://
traccar.protocol=http://
traccar.host=${traccar.protocol}localhost${traccar.port}

traccar.name=admin
traccar.password=admin
traccar.email=admin@scenario.com

# WebSocket is derived from host + port
traccar.websocket.url=ws://localhost${traccar.port}/api/socket?consumeAsClient=true

traccar.web.serviceAccountToken=VIRTUAL_ADMIN_ACCESS

osmand.port=5055
osmand.host=${traccar.protocol}localhost:${osmand.port}

traccar.server.registration=true

# Camel Configuration
camel.springboot.main-run-controller=true

