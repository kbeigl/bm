traccar.admin.password=admin
traccar.admin.email=admin@domain.com
traccar.user.name=user
traccar.user.password=user
traccar.user.email=user@domain.com

# logging levels
logging.level.org.springframework = INFO
# switch on for @Aspect dev etc.
logging.level.bm.traccar.api = DEBUG
