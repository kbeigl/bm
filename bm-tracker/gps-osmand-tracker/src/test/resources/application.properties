spring.application.name=gps-tracker

### gps tracker configuration

# port can be empty, defaults to port ':80'. 
# MUST provide a colon! i.e. :8080
traccar.port=
# http:// or secure https://
traccar.protocol=http://
traccar.host=${traccar.protocol}localhost${traccar.port}

traccar.name=admin
traccar.password=admin
traccar.email=admin@scenario.com

traccar.web.serviceAccountToken=VIRTUAL_ADMIN_ACCESS

# port for tracker protocol osmand
# TODO -  USE DIFFERENT PORT THAN TRACCAR CLIENT PORT!
osmand.port=5055
osmand.host=${traccar.protocol}localhost:${osmand.port}

camel.main.run-controller=true

logging.pattern.console=[${spring.application.name}] %d{yy.MM.dd HH:mm:ss.SSSXXX} %-10level --- [%10.10t] %logger{36} : %msg%n

