spring.application.name=gps-osmand-player

# port can be empty, defaults to port ':80'. 
# MUST provide a colon! i.e. :8080
traccar.port=
# http:// or secure https://
traccar.protocol=http://
traccar.host=${traccar.protocol}localhost${traccar.port}
# traccar.host=http://localhost
# WebSocket is derived from host (+ port)

# traccar.name=admin
# traccar.password=admin
# traccar.email=admin@scenario.com

# port for tracker protocol osmand
osmand.port=5055
osmand.host=${traccar.protocol}localhost:${osmand.port}

traccar.server.registration=true

# Spring Configuration
# don't use ANSI colors in logs for easier copying
spring.output.ansi.enabled=never

# Camel Configuration for Spring Boot testing
camel.springboot.main-run-controller=false

# GPX player input / output
# gps.player.send-directory=${java.io.tmpdir}/gps-osmand-player/input

# hardcoded for development in target dir
# gpx.source-directory=/home/kbeigl/git/bm/bm-tracker/gps-osmand-player/src/test/resources/gpx
# gps.player.send-directory=/home/kbeigl/git/bm/bm-tracker/gps-osmand-player/target/send

# relative to the gps-osmand-player module directory (works locally and in CI)
gpx.source-directory=src/test/resources/gpx
gps.player.send-directory=target/send

gps.player.output-uri=seda:osmandMessages
gps.player.include=.*\\.gpx
gps.player.poll-delay-ms=1000
gps.player.initial-delay-ms=0
gps.player.device-id=

# logging levels
logging.level.org.springframework = INFO
# logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.apache.camel.spring.boot=DEBUG
# switch on for @Aspect dev etc.
# logging.level.bm.traccar.api = DEBUG
# logging.level.io.vertx=DEBUG
# logging.level.org.apache.camel.component.vertx=DEBUG
# logging.level.org.apache.camel=DEBUG
